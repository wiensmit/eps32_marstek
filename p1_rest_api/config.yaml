name: "P1 REST API"
version: "1.0.2"
slug: p1_rest_api
description: "REST API exposing a Home Assistant P1 power sensor as JSON for ESP32 polling"
url: https://github.com/wiensmit/eps32_marstek
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
homeassistant_api: true
ports:
  8088/tcp: 8088
ports_description:
  8088/tcp: "P1 REST endpoint"
options:
  sensor_entity: sensor.marstek_meter_p1_adjusted
  listen_port: 8088
  cache_ttl_ms: 1000
  stale_fallback_ms: 30000
  log_requests: false
schema:
  sensor_entity: str
  listen_port: port
  cache_ttl_ms: int(100,10000)
  stale_fallback_ms: int(1000,600000)
  log_requests: bool
